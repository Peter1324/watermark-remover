<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Watermark Bench</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#101218; --panel:#181B23; --panel2:#1E222C; --line:#2A2F3B;
    --ink:#ECEAE3; --muted:#8A90A0; --dim:#5C6373;
    --accent:#5B8CFF; --mark:#FF4D6D; --ok:#36D399; --warn:#F5B14C; --err:#FF5C5C;
    --r:14px; --r-sm:9px;
    --display:'Space Grotesk',system-ui,sans-serif;
    --mono:ui-monospace,'SF Mono',Menlo,monospace;
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    background:
      radial-gradient(1100px 500px at 80% -10%, rgba(91,140,255,.07), transparent 60%),
      var(--bg);
    color:var(--ink); font-family:system-ui,-apple-system,sans-serif;
    -webkit-font-smoothing:antialiased; min-height:100vh;
  }
  a{color:inherit}

  /* ---- top bar ---- */
  .top{
    position:sticky; top:0; z-index:20; display:flex; align-items:center; gap:1.2rem;
    padding:.9rem 1.4rem; background:rgba(16,18,24,.82); backdrop-filter:blur(10px);
    border-bottom:1px solid var(--line);
  }
  .brand{display:flex; align-items:center; gap:.6rem; font-family:var(--display); font-weight:600;
         letter-spacing:.14em; text-transform:uppercase; font-size:.92rem}
  .reg{width:18px; height:18px; flex:none; color:var(--mark)}
  .count{font-family:var(--mono); font-size:.78rem; color:var(--muted)}
  .top .right{margin-left:auto; display:flex; gap:.55rem}

  /* ---- buttons ---- */
  button{font-family:var(--display); font-size:.86rem; font-weight:500; cursor:pointer;
         border:1px solid var(--line); background:var(--panel2); color:var(--ink);
         border-radius:var(--r-sm); padding:.5rem .85rem; transition:.16s ease}
  button:hover:not(:disabled){border-color:#3a4150; background:#242936}
  button:disabled{opacity:.42; cursor:not-allowed}
  button.primary{background:var(--accent); border-color:transparent; color:#0a1020; font-weight:600}
  button.primary:hover:not(:disabled){background:#7aa0ff}
  button.success{background:var(--ok); border-color:transparent; color:#06251a; font-weight:600}
  button.success:hover:not(:disabled){background:#54e0ad}
  button.ghost{background:transparent}
  button.danger:hover:not(:disabled){border-color:var(--err); color:#ffb3b3}
  button.sm{padding:.36rem .6rem; font-size:.8rem}
  button.icon{padding:.34rem .5rem; line-height:1; background:transparent; color:var(--muted)}
  button.icon:hover:not(:disabled){color:var(--ink)}
  button.icon.xs{padding:.1rem .32rem; font-size:.72rem}

  /* ---- layout ---- */
  .wrap{max-width:1680px; margin:0 auto; padding:1.4rem}
  .drop{
    border:1.5px dashed var(--line); border-radius:var(--r); padding:1.6rem;
    display:flex; align-items:center; justify-content:space-between; gap:1rem; flex-wrap:wrap;
    background:linear-gradient(180deg,var(--panel),rgba(24,27,35,.4)); transition:.18s ease; margin-bottom:1.4rem;
  }
  .drop.over{border-color:var(--accent); background:rgba(91,140,255,.07)}
  .drop h1{font-family:var(--display); font-weight:600; font-size:1.15rem; margin:0 0 .25rem}
  .drop p{margin:0; color:var(--muted); font-size:.9rem}
  .drop .pick{display:inline-flex; align-items:center}
  input[type=file]{display:none}
  .pick-btn{display:inline-block}

  .empty{text-align:center; color:var(--dim); padding:3.5rem 1rem; font-size:.95rem}
  .empty .reg{width:40px;height:40px;opacity:.5;margin:0 auto .8rem;display:block}

  .grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(min(560px,100%),1fr)); gap:1.3rem}

  /* ---- card ---- */
  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--r);
    padding:1rem; display:flex; flex-direction:column; gap:.7rem;
    opacity:0; transform:translateY(8px); transition:opacity .35s ease, transform .35s ease;
  }
  .card.in{opacity:1; transform:none}
  .card-head{display:flex; align-items:center; gap:.5rem}
  .fname{font-family:var(--display); font-weight:500; font-size:.95rem; overflow:hidden;
         text-overflow:ellipsis; white-space:nowrap; flex:1}

  .stage{position:relative; background:#000; border-radius:var(--r-sm); overflow:hidden;
         outline:1px solid var(--line); transition:outline-color .18s ease}
  .stage.armed{outline:1px solid var(--line); box-shadow:0 0 0 2px rgba(255,77,109,.35)}
  .stage video{display:block; width:100%; max-height:520px; object-fit:contain; background:#000}
  .stage canvas{position:absolute; inset:0; width:100%; height:100%; pointer-events:none}
  .stage canvas.armed{pointer-events:auto; cursor:crosshair}

  .video-controls{
    display:grid; grid-template-columns:auto 1fr auto; gap:.6rem; align-items:center;
    padding:.55rem .65rem; border:1px solid var(--line); border-radius:var(--r-sm);
    background:var(--panel2);
  }
  .video-controls input[type=range]{width:100%; accent-color:var(--accent)}
  .time{font-family:var(--mono); font-size:.72rem; color:var(--muted); white-space:nowrap}
  .arm-hint{display:none !important}

  .stage-tools{display:flex; align-items:center; gap:.4rem}
  .mark-btn.on{background:var(--mark); border-color:transparent; color:#1a0a0f; font-weight:600}
  .stage-tools .spacer{flex:1}
  .mark-count{font-family:var(--mono); font-size:.76rem; color:var(--muted)}

  .marks{display:flex; flex-wrap:wrap; gap:.4rem; min-height:1.4rem}
  .mark-chip{display:inline-flex; align-items:center; gap:.4rem; padding:.18rem .3rem .18rem .5rem;
             border:1px solid var(--line); border-radius:999px; font-size:.78rem; background:var(--panel2)}
  .mark-chip b{font-family:var(--mono); color:var(--mark)}
  .mark-chip .dim{font-family:var(--mono); color:var(--dim); font-size:.72rem}
  .mark-actions{display:flex; gap:.4rem}

  .card-foot{display:flex; align-items:center; gap:.7rem; flex-wrap:wrap}
  .qual{display:inline-flex; align-items:center; gap:.4rem; font-size:.8rem; color:var(--muted);
        font-family:var(--display)}
  select{font-family:var(--display); font-size:.82rem; color:var(--ink); background:var(--panel2);
         border:1px solid var(--line); border-radius:var(--r-sm); padding:.34rem .5rem}
  .status{margin-left:auto; display:inline-flex; align-items:center; gap:.45rem; font-family:var(--display);
          font-weight:500; font-size:.84rem}
  .status::before{content:""; width:8px; height:8px; border-radius:50%; background:var(--dim)}
  .status.ready::before{background:var(--accent)} .status.ready{color:#aac2ff}
  .status.wait::before{background:var(--warn)}    .status.wait{color:#f3cd92}
  .status.work::before{background:var(--accent); animation:pulse 1s infinite}
  .status.work{color:#aac2ff}
  .status.done::before{background:var(--ok)}      .status.done{color:#8bf0cb}
  .status.err::before{background:var(--err)}      .status.err{color:#ff9a9a}
  .status.cancel::before{background:var(--muted)} .status.cancel{color:var(--muted)}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

  .note{font-size:.76rem; color:var(--dim); margin-top:-.2rem}
  .err-box{font-size:.8rem; color:#ff9a9a; background:rgba(255,92,92,.08);
           border:1px solid rgba(255,92,92,.25); border-radius:var(--r-sm); padding:.45rem .6rem}

  .progress{height:5px; border-radius:99px; background:var(--panel2); overflow:hidden}
  .progress > i{display:block; height:100%; width:35%; border-radius:99px;
                background:linear-gradient(90deg,transparent,var(--accent),transparent);
                animation:slide 1.1s infinite linear}
  @keyframes slide{0%{transform:translateX(-120%)}100%{transform:translateX(360%)}}

  .actions{display:flex; gap:.5rem; flex-wrap:wrap}
  .actions .primary,.actions .success{flex:1; min-width:120px}

  .muted{color:var(--muted)} .sm{font-size:.8rem}

  @media (prefers-reduced-motion: reduce){
    *{animation:none !important; transition:none !important}
  }
  @media (max-width:520px){ .grid{grid-template-columns:1fr} }
</style>
</head>
<body>

<div class="top">
  <div class="brand">
    <svg class="reg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M3 8V3h5M21 8V3h-5M3 16v5h5M21 16v5h-5"/><circle cx="12" cy="12" r="3.2"/>
    </svg>
    Watermark Bench
  </div>
  <span class="count" id="topCount">0 Videos</span>
  <div class="right">
    <button class="ghost sm" id="cancelAll">Alle stornieren</button>
    <button class="primary sm" id="processAll">Alle verarbeiten</button>
  </div>
</div>

<div class="wrap">
  <div class="drop" id="drop">
    <div>
      <h1>Videos laden</h1>
      <p>Zieh Videos hierher oder wähle sie aus. Jedes Video bekommt eine eigene Karte und eigene Markierungen.</p>
    </div>
    <label class="pick">
      <span class="pick-btn"><button class="primary" type="button" onclick="document.getElementById('file').click()">Videos wählen</button></span>
      <input type="file" id="file" accept="video/*" multiple>
    </label>
  </div>

  <div class="empty" id="empty">
    <svg class="reg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M3 8V3h5M21 8V3h-5M3 16v5h5M21 16v5h-5"/><circle cx="12" cy="12" r="3.2"/>
    </svg>
    Noch keine Videos. Lade welche, um zu starten.
  </div>

  <div class="grid" id="grid"></div>
</div>

<script>
"use strict";

const MAX_BOXES = 20;
const cards = new Map();
const grid = document.getElementById('grid');
const emptyEl = document.getElementById('empty');
const topCount = document.getElementById('topCount');

const STATUS = {
  needs_boxes: { t:'Markierungen fehlen', c:'' },
  ready:       { t:'Bereit',              c:'ready' },
  queued:      { t:'Wartet',              c:'wait' },
  processing:  { t:'Wird verarbeitet …',  c:'work' },
  done:        { t:'Fertig',              c:'done' },
  error:       { t:'Fehler',              c:'err' },
  canceled:    { t:'Abgebrochen',         c:'cancel' },
};

const uid = () => Math.random().toString(36).slice(2, 10);
const clamp = (v, a, b) => Math.max(a, Math.min(b, v));
const fmtTime = sec => {
  sec = Number.isFinite(sec) ? Math.max(0, sec) : 0;
  const m = Math.floor(sec / 60);
  const s = Math.floor(sec % 60);
  return `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
};

function videoContentRect(card){
  const { video, canvas } = card.refs;
  const cw = canvas.width || 0;
  const ch = canvas.height || 0;
  const vw = video.videoWidth || 0;
  const vh = video.videoHeight || 0;

  if (!cw || !ch || !vw || !vh) {
    return { x:0, y:0, w:cw, h:ch };
  }

  const canvasRatio = cw / ch;
  const videoRatio = vw / vh;

  if (canvasRatio > videoRatio) {
    const h = ch;
    const w = h * videoRatio;
    return { x:(cw - w) / 2, y:0, w, h };
  } else {
    const w = cw;
    const h = w / videoRatio;
    return { x:0, y:(ch - h) / 2, w, h };
  }
}

function displayRectToReal(card, d){
  const { video } = card.refs;
  const r = videoContentRect(card);

  const x0 = clamp(d.x, r.x, r.x + r.w);
  const y0 = clamp(d.y, r.y, r.y + r.h);
  const x1 = clamp(d.x + d.w, r.x, r.x + r.w);
  const y1 = clamp(d.y + d.h, r.y, r.y + r.h);

  const left = Math.min(x0, x1);
  const top = Math.min(y0, y1);
  const right = Math.max(x0, x1);
  const bottom = Math.max(y0, y1);

  const rx0 = clamp(Math.round(((left - r.x) / r.w) * video.videoWidth), 0, video.videoWidth);
  const ry0 = clamp(Math.round(((top - r.y) / r.h) * video.videoHeight), 0, video.videoHeight);
  const rx1 = clamp(Math.round(((right - r.x) / r.w) * video.videoWidth), 0, video.videoWidth);
  const ry1 = clamp(Math.round(((bottom - r.y) / r.h) * video.videoHeight), 0, video.videoHeight);

  return {
    x: rx0,
    y: ry0,
    w: Math.max(1, rx1 - rx0),
    h: Math.max(1, ry1 - ry0)
  };
}

function realRectToDisplay(card, b){
  const { video } = card.refs;
  const r = videoContentRect(card);
  return {
    x: r.x + (b.x / video.videoWidth) * r.w,
    y: r.y + (b.y / video.videoHeight) * r.h,
    w: (b.w / video.videoWidth) * r.w,
    h: (b.h / video.videoHeight) * r.h
  };
}
const escapeHtml = s => s.replace(/[&<>"']/g, c => (
  {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---------- adding videos ---------- */
function addFiles(fileList){
  for (const file of fileList){
    if (!file.type.startsWith('video/')) continue;
    const card = {
      id: uid(), file, url: URL.createObjectURL(file),
      boxes: [], target: 'original', status: 'needs_boxes',
      markMode: false, dragRect: null, resultBlob: null, resultName: null,
      abort: null, error: null, note: '',
    };
    cards.set(card.id, card);
    buildCard(card);
  }
  syncChrome();
}

function buildCard(card){
  const node = document.createElement('div');
  node.className = 'card';
  node.innerHTML = `
    <div class="card-head">
      <span class="fname" title="${escapeHtml(card.file.name)}">${escapeHtml(card.file.name)}</span>
      <button class="icon danger" data-act="remove" title="Karte entfernen">✕</button>
    </div>
    <div class="stage" data-stage>
      <video data-video preload="metadata" playsinline></video>
      <canvas data-canvas></canvas>
      <div class="arm-hint" data-armhint hidden>Markiermodus aktiv — Rechteck über das Wasserzeichen ziehen</div>
    </div>
    <div class="video-controls">
      <button class="sm" data-act="play" type="button">Play</button>
      <input data-scrub type="range" min="0" max="1000" value="0" step="1">
      <span class="time" data-time>00:00 / 00:00</span>
    </div>
    <div class="stage-tools">
      <button class="mark-btn" data-act="mark">Markieren</button>
      <button class="icon" data-act="back" title="0,1 s zurück">«</button>
      <button class="icon" data-act="fwd" title="0,1 s vor">»</button>
      <span class="spacer"></span>
      <span class="mark-count" data-count>Markierungen: 0</span>
    </div>
    <div class="marks" data-marks></div>
    <div class="mark-actions">
      <button class="ghost sm" data-act="undo">Letzte löschen</button>
      <button class="ghost sm" data-act="clear">Alle löschen</button>
    </div>
    <div class="card-foot">
      <label class="qual">Qualität
        <select data-target>
          <option value="original">Original</option>
          <option value="1080">1080p</option>
          <option value="1440">1440p</option>
        </select>
      </label>
      <span class="status" data-status></span>
    </div>
    <div class="note" data-note hidden></div>
    <div class="err-box" data-err hidden></div>
    <div class="progress" data-progress hidden><i></i></div>
    <div class="actions">
      <button class="primary" data-act="process">Verarbeiten</button>
      <button class="ghost" data-act="cancel" hidden>Stornieren</button>
      <button class="success" data-act="download" hidden>Herunterladen</button>
    </div>
  `;
  card.node = node;
  const q = sel => node.querySelector(sel);
  card.refs = {
    stage:q('[data-stage]'), video:q('[data-video]'), canvas:q('[data-canvas]'),
    armhint:q('[data-armhint]'), play:q('[data-act="play"]'), scrub:q('[data-scrub]'), time:q('[data-time]'),
    markBtn:q('[data-act="mark"]'), count:q('[data-count]'),
    marks:q('[data-marks]'), target:q('[data-target]'), status:q('[data-status]'),
    note:q('[data-note]'), err:q('[data-err]'), progress:q('[data-progress]'),
    process:q('[data-act="process"]'), cancel:q('[data-act="cancel"]'),
    download:q('[data-act="download"]'),
  };
  card.refs.video.src = card.url;

  wireCard(card);
  grid.appendChild(node);
  requestAnimationFrame(() => node.classList.add('in'));
  updateCard(card);
}

function wireCard(card){
  const { video, canvas } = card.refs;

  const sizeCanvas = () => {
    const w = video.clientWidth, h = video.clientHeight;
    if (w && h && (canvas.width !== w || canvas.height !== h)){ canvas.width = w; canvas.height = h; }
    redraw(card);
  };
  video.addEventListener('loadedmetadata', () => {
    sizeCanvas();
    syncVideoControls(card);
  });
  video.addEventListener('timeupdate', () => syncVideoControls(card));
  video.addEventListener('play', () => syncVideoControls(card));
  video.addEventListener('pause', () => syncVideoControls(card));
  card.refs.scrub.addEventListener('input', e => {
    if (!Number.isFinite(video.duration) || video.duration <= 0) return;
    video.currentTime = (Number(e.target.value) / 1000) * video.duration;
    syncVideoControls(card);
  });
  new ResizeObserver(sizeCanvas).observe(video);

  // drawing via pointer capture (only fires when canvas pointer-events is enabled)
  let start = null;
  const pos = e => {
    const r = canvas.getBoundingClientRect();
    const vr = videoContentRect(card);
    return {
      x: clamp(e.clientX - r.left, vr.x, vr.x + vr.w),
      y: clamp(e.clientY - r.top, vr.y, vr.y + vr.h)
    };
  };
  canvas.addEventListener('pointerdown', e => {
    if (!card.markMode) return;
    canvas.setPointerCapture(e.pointerId);
    video.pause();
    start = pos(e);
    card.dragRect = { x:start.x, y:start.y, w:0, h:0 };
  });
  canvas.addEventListener('pointermove', e => {
    if (!card.markMode || !start) return;
    const p = pos(e);
    card.dragRect = { x:Math.min(start.x,p.x), y:Math.min(start.y,p.y),
                      w:Math.abs(p.x-start.x), h:Math.abs(p.y-start.y) };
    redraw(card);
  });
  const finishDraw = () => {
    if (!card.markMode || !start) return;
    const d = card.dragRect; start = null; card.dragRect = null;
    if (d && d.w > 4 && d.h > 4){
      if (card.boxes.length >= MAX_BOXES){
        flashNote(card, `Maximal ${MAX_BOXES} Markierungen.`);
      } else {
        const realBox = displayRectToReal(card, d);
        card.boxes.push(realBox);
        console.log("Neue Markierung in echten Videopixeln:", realBox);
        if (['needs_boxes','ready','error','canceled'].includes(card.status))
          setStatus(card, 'ready');
      }
    }
    redraw(card); updateCard(card);
  };
  canvas.addEventListener('pointerup', finishDraw);
  canvas.addEventListener('pointercancel', () => { start = null; card.dragRect = null; redraw(card); });

  card.refs.target.addEventListener('change', e => { card.target = e.target.value; });

  card.node.addEventListener('click', e => {
    const act = e.target.closest('[data-act]')?.dataset.act;
    if (!act) return;
    if (act === 'play')      togglePlay(card);
    if (act === 'mark')      toggleMark(card);
    if (act === 'back')      video.currentTime = Math.max(0, video.currentTime - 0.1);
    if (act === 'fwd')       video.currentTime = video.currentTime + 0.1;
    if (act === 'undo'){     card.boxes.pop(); afterBoxChange(card); }
    if (act === 'clear'){    card.boxes = []; afterBoxChange(card); }
    if (act === 'process')   processCard(card);
    if (act === 'cancel')    cancelCard(card);
    if (act === 'remove')    removeCard(card);
    if (act === 'download')  downloadCard(card);
  });
}

function togglePlay(card){
  const video = card.refs.video;
  if (card.markMode) toggleMark(card);
  if (video.paused) video.play();
  else video.pause();
}

function syncVideoControls(card){
  const { video, scrub, time, play } = card.refs;
  const duration = Number.isFinite(video.duration) ? video.duration : 0;
  const current = Number.isFinite(video.currentTime) ? video.currentTime : 0;
  scrub.value = duration > 0 ? Math.round((current / duration) * 1000) : 0;
  time.textContent = `${fmtTime(current)} / ${fmtTime(duration)}`;
  play.textContent = video.paused ? 'Play' : 'Pause';
}

/* ---------- marking ---------- */
function toggleMark(card){
  card.markMode = !card.markMode;
  card.refs.canvas.classList.toggle('armed', card.markMode);
  card.refs.stage.classList.toggle('armed', card.markMode);
  card.refs.markBtn.classList.toggle('on', card.markMode);
  card.refs.markBtn.textContent = card.markMode ? 'Fertig' : 'Markieren';
  card.refs.armhint.hidden = !card.markMode;
  if (card.markMode) card.refs.video.pause();
}

function afterBoxChange(card){
  if (!card.boxes.length && ['ready','error','canceled'].includes(card.status))
    setStatus(card, 'needs_boxes');
  else if (card.boxes.length && card.status === 'needs_boxes')
    setStatus(card, 'ready');
  redraw(card); updateCard(card);
}

function redraw(card){
  const { canvas, video } = card.refs;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  card.boxes.forEach((b, i) => {
    const d = realRectToDisplay(card, b);
    drawMark(ctx, d.x, d.y, d.w, d.h, i+1, false);
  });
  if (card.dragRect){
    const d = card.dragRect;
    drawMark(ctx, d.x, d.y, d.w, d.h, card.boxes.length+1, true);
  }
}

function drawMark(ctx, x, y, w, h, n, active){
  ctx.save();
  ctx.strokeStyle = '#FF4D6D';
  ctx.lineWidth = 2;
  ctx.setLineDash(active ? [6,4] : []);
  ctx.strokeRect(x, y, w, h);
  ctx.setLineDash([]);
  // corner ticks
  const t = Math.min(9, w/2, h/2);
  ctx.beginPath();
  ctx.moveTo(x, y+t); ctx.lineTo(x, y); ctx.lineTo(x+t, y);
  ctx.moveTo(x+w-t, y); ctx.lineTo(x+w, y); ctx.lineTo(x+w, y+t);
  ctx.moveTo(x+w, y+h-t); ctx.lineTo(x+w, y+h); ctx.lineTo(x+w-t, y+h);
  ctx.moveTo(x+t, y+h); ctx.lineTo(x, y+h); ctx.lineTo(x, y+h-t);
  ctx.stroke();
  if (!active){
    const bw = 20, bh = 16, by = (y - bh < 0) ? y : y - bh;
    ctx.fillStyle = '#FF4D6D';
    ctx.fillRect(x, by, bw, bh);
    ctx.fillStyle = '#12141A';
    ctx.font = '600 11px ui-monospace, monospace';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(String(n), x + bw/2, by + bh/2 + .5);
  }
  ctx.restore();
}

/* ---------- status + rendering ---------- */
function setStatus(card, status){ card.status = status; updateCard(card); }

function updateCard(card){
  const r = card.refs;
  const s = STATUS[card.status] || STATUS.needs_boxes;
  r.status.textContent = s.t;
  r.status.className = 'status ' + s.c;

  r.count.textContent = `Markierungen: ${card.boxes.length}`;
  renderMarks(card);

  const busy = card.status === 'processing';
  const queued = card.status === 'queued';
  r.progress.hidden = !busy;

  // process button: usable when there is at least one box and not currently busy/queued/done
  r.process.hidden = ['processing','queued','done'].includes(card.status);
  r.process.disabled = card.boxes.length === 0 || busy || queued;
  r.process.textContent = (card.status === 'error' || card.status === 'canceled') ? 'Erneut verarbeiten' : 'Verarbeiten';

  r.cancel.hidden = !(busy || queued);
  r.download.hidden = card.status !== 'done';

  // error + note
  if (card.status === 'error' && card.error){ r.err.hidden = false; r.err.textContent = 'Fehler: ' + card.error; }
  else r.err.hidden = true;

  if (card.note){ r.note.hidden = false; r.note.textContent = card.note; }
  else r.note.hidden = true;

  // mark controls disabled while busy
  r.markBtn.disabled = busy;
}

function renderMarks(card){
  const wrap = card.refs.marks;
  if (!card.boxes.length){ wrap.innerHTML = '<span class="muted sm">Keine Markierungen</span>'; return; }
  wrap.innerHTML = card.boxes.map((b,i) =>
    `<span class="mark-chip"><b>${i+1}</b><span class="dim">${b.w}×${b.h}</span>` +
    `<button class="icon xs" data-del="${i}" title="Markierung ${i+1} löschen">✕</button></span>`
  ).join('');
  wrap.querySelectorAll('[data-del]').forEach(btn => {
    btn.onclick = () => { card.boxes.splice(+btn.dataset.del, 1); afterBoxChange(card); };
  });
}

function flashNote(card, msg){
  card.note = msg; updateCard(card);
  setTimeout(() => { if (card.note === msg){ card.note = ''; updateCard(card); } }, 2500);
}

/* ---------- processing (works with the existing synchronous /process) ---------- */
async function processCard(card){
  if (card.boxes.length === 0) return;
  card.error = ''; card.note = '';
  card.abort = new AbortController();
  setStatus(card, 'processing');

  const fd = new FormData();
  fd.append('file', card.file);
  fd.append('boxes', JSON.stringify(card.boxes.map(b => ({ x:b.x, y:b.y, w:b.w, h:b.h }))));
  fd.append('target', card.target);
  // compatibility fallback for the old single-box fields (server prefers `boxes`):
  const b0 = card.boxes[0];
  fd.append('x', b0.x); fd.append('y', b0.y); fd.append('w', b0.w); fd.append('h', b0.h);

  try {
    const resp = await fetch('/process', { method:'POST', body: fd, signal: card.abort.signal });
    const ct = resp.headers.get('content-type') || '';
    if (!resp.ok || !ct.includes('video')){
      let msg = 'Verarbeitung fehlgeschlagen.';
      try { msg = (await resp.text()).slice(0, 300) || msg; } catch(_) {}
      throw new Error(msg);
    }
    card.resultBlob = await resp.blob();
    const base = card.file.name.replace(/\.[^.]+$/, '');
    card.resultName = `clean_${base}.mp4`;
    setStatus(card, 'done');
  } catch (e){
    if (e.name === 'AbortError'){
      card.note = 'Browser-Abbruch — GPU-Job kann noch zu Ende laufen.';
      setStatus(card, 'canceled');
    } else {
      card.error = e.message;
      setStatus(card, 'error');
    }
  } finally {
    card.abort = null;
  }
}

function cancelCard(card){
  if (card.abort){
    card.abort.abort();                 // running fetch -> Browser-Abbruch
  } else if (['ready','needs_boxes','queued'].includes(card.status)){
    card.note = '';
    setStatus(card, 'canceled');
  }
}

function removeCard(card){
  if (card.abort) card.abort.abort();
  URL.revokeObjectURL(card.url);
  card.node.remove();
  cards.delete(card.id);
  syncChrome();
}

function downloadCard(card){
  if (!card.resultBlob) return;
  const url = URL.createObjectURL(card.resultBlob);
  const a = document.createElement('a');
  a.href = url; a.download = card.resultName || 'clean.mp4';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 15000);
}

/* ---------- global actions (sequential — server is synchronous + RunPod max workers = 1) ---------- */
async function processAll(){
  const queue = [...cards.values()].filter(c =>
    c.boxes.length > 0 && ['ready','error','canceled'].includes(c.status));
  queue.forEach(c => setStatus(c, 'queued'));
  for (const c of queue){
    if (!cards.has(c.id) || c.status !== 'queued') continue;   // removed/canceled meanwhile
    await processCard(c);
  }
}

function cancelAll(){
  for (const c of cards.values()){
    if (c.abort) c.abort.abort();
    else if (['ready','needs_boxes','queued'].includes(c.status)) setStatus(c, 'canceled');
  }
}

/* ---------- chrome ---------- */
function syncChrome(){
  const n = cards.size;
  emptyEl.style.display = n ? 'none' : 'block';
  topCount.textContent = `${n} Video${n === 1 ? '' : 's'}`;
}

/* ---------- wiring ---------- */
const drop = document.getElementById('drop');
const fileInput = document.getElementById('file');
fileInput.addEventListener('change', e => { addFiles(e.target.files); fileInput.value = ''; });
['dragover','dragenter'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add('over'); }));
['dragleave'].forEach(ev => drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove('over'); }));
drop.addEventListener('drop', e => { e.preventDefault(); drop.classList.remove('over'); addFiles(e.dataTransfer.files); });
document.getElementById('processAll').addEventListener('click', processAll);
document.getElementById('cancelAll').addEventListener('click', cancelAll);

syncChrome();
</script>
